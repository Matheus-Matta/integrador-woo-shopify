<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Integrador</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
  <div class="bg-gray-800 rounded-2xl shadow-xl p-8 w-full max-w-sm space-y-6">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-white">🔒 Integrador</h1>
      <p class="text-gray-400 text-sm mt-1">Acesso ao Dashboard</p>
    </div>
    <form id="form" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-300 mb-1">Senha</label>
        <input
          id="password"
          type="password"
          required
          placeholder="••••••••"
          class="w-full bg-gray-700 text-white border border-gray-600 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>
      <p id="error" class="text-red-400 text-sm hidden">Senha incorreta.</p>
      <button
        type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition"
      >
        Entrar
      </button>
    </form>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const error = document.getElementById('error');
      error.classList.add('hidden');

      try {
        const res = await fetch('/dashboard/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
          credentials: 'include',
        });
        if (res.ok) {
          window.location.href = '/dashboard';
        } else {
          error.classList.remove('hidden');
        }
      } catch {
        error.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
